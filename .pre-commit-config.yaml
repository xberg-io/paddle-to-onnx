default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
exclude: ^third_party/|vendor/|node_modules/|dist/|\.setuptools-cmake-build/|patches/
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/xberg-io/pre-commit-hooks
  rev: v3.0.0
  hooks:
  - id: ai-rulez-generate
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-merge-conflict
  - id: check-added-large-files
  - id: detect-private-key
  - id: check-json
  - id: check-yaml
    args:
    - --allow-multiple-documents
    - --unsafe
  - id: check-toml
  - id: check-case-conflict
  - id: pyproject-fmt
  - id: ruff
  - id: ruff-format
  - id: oxfmt
  - id: mypy
  - id: clang-format
  - id: cppcheck
  - id: shfmt
    args:
    - -w
    - -i
    - '2'
  - id: shellcheck
  - id: rumdl-fmt
  - id: actionlint
  - id: gh-actions-updater
  - id: typos
    args:
    - --force-exclude
