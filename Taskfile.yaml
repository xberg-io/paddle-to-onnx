version: "3"

vars:
  EXPORT_DIR: /tmp/paddle-to-onnx-exports

tasks:
  setup:
    desc: "Install dependencies and build the C++ extension"
    cmds:
      - uv sync
      - uv pip install -e .
      - command -v poly >/dev/null 2>&1 || brew install goldziher/tap/poly
      - poly hooks install
    sources:
      - pyproject.toml
      - uv.lock
      - CMakeLists.txt
      - setup.py

  build:
    desc: "Build the C++ extension (setuptools cmake build)"
    cmds:
      - uv pip install -e .

  export:slanet:
    desc: "Export SLANet_plus to ONNX with ORT compatibility fix"
    deps: [build]
    cmds:
      - mkdir -p "{{.EXPORT_DIR}}"
      - uv run python tools/export_hf_models.py --model SLANet_plus --output-dir "{{.EXPORT_DIR}}"

  export:all:
    desc: "Export all configured models to ONNX"
    deps: [build]
    cmds:
      - mkdir -p "{{.EXPORT_DIR}}"
      - uv run python tools/export_hf_models.py --all --output-dir "{{.EXPORT_DIR}}"

  export:v6:
    desc: "Export the PP-OCRv6 models (medium/small/tiny det+rec) to ONNX"
    deps: [build]
    cmds:
      - mkdir -p "{{.EXPORT_DIR}}"
      - >-
        uv run python tools/export_hf_models.py
        --models PP-OCRv6_medium_det,PP-OCRv6_small_det,PP-OCRv6_tiny_det,PP-OCRv6_medium_rec,PP-OCRv6_small_rec,PP-OCRv6_tiny_rec
        --output-dir "{{.EXPORT_DIR}}"

  export:
    desc: "Export a specific model (usage: task export -- ModelName)"
    deps: [build]
    cmds:
      - mkdir -p "{{.EXPORT_DIR}}"
      - uv run python tools/export_hf_models.py --model "{{.CLI_ARGS}}" --output-dir "{{.EXPORT_DIR}}"

  upload:v6:
    desc: "Upload exported PP-OCRv6 models to xberg-io/paddleocr-onnx-models (needs HF_TOKEN)"
    cmds:
      - uv run python tools/upload_hf_models.py --export-dir "{{.EXPORT_DIR}}" --generation v6

  upload:
    desc: "Upload all exported models with an upload_path to the HF repo (needs HF_TOKEN)"
    cmds:
      - uv run python tools/upload_hf_models.py --export-dir "{{.EXPORT_DIR}}"

  lint:
    desc: "Run all linters via poly"
    cmds:
      - poly lint .

  format:
    desc: "Format all code via poly"
    cmds:
      - poly fmt --fix .

  typecheck:
    desc: "Run pyrefly type checker"
    cmds:
      - pyrefly check paddle2onnx setup.py

  test:
    desc: "Run tests"
    cmds:
      - uv run --group test pytest tests/

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf .setuptools-cmake-build build dist *.egg-info
