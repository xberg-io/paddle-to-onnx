# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".setuptools-cmake-build/**",
    "dist/**",
    "node_modules/**",
    "patches/**",
    "third_party/**",
    "vendor/**",
]

[lint.python.ruff]
select = ["B", "C4", "E", "F", "FURB", "I", "PERF", "PIE", "RET", "RUF", "SIM", "TCH", "UP", "W"]
ignore = ["E501", "E721", "PERF401", "RET504", "SIM108", "SIM112", "SIM115"]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".setuptools-cmake-build/**",
    "dist/**",
    "node_modules/**",
    "patches/**",
    "third_party/**",
    "vendor/**",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".setuptools-cmake-build/**",
    "dist/**",
    "node_modules/**",
    "patches/**",
    "third_party/**",
    "vendor/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".setuptools-cmake-build/**",
    "dist/**",
    "node_modules/**",
    "patches/**",
    "third_party/**",
    "vendor/**",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.pyrefly]
enabled = true

[tools.clang-format]
enabled = true

[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.actionlint]
enabled = true

