
version = '4.0'
name = 'Paddle2ONNX'
description = 'Convert PaddlePaddle models to ONNX format'
gitignore = true
presets = ["claude", "codex"]
builtins = ['python', 'default-commands']

compact = true
[header]
style = 'minimal'

[[includes]]
name = 'xberg-core'
source = 'https://github.com/xberg-io/agent-conventions.git'
path = 'modules/core'
merge_strategy = 'local-override'

[[marketplaces]]
name = "basemind"
source = "Goldziher/basemind"
type = "github"

[[plugins]]
marketplace = "basemind"
name = "basemind"
scope = "project"
enabled = true
