$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: Convert PaddlePaddle models to ONNX format
gitignore: true
name: Paddle2ONNX

header:
  style: minimal

includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    merge_strategy: local-override
builtins:
  - python
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
  - copilot
  - cursor
  - antigravity
  - codex

version: "3.0"
