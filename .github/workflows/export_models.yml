name: Export PaddlePaddle Models to ONNX

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to export (e.g. SLANet_plus), or "all"'
        required: true
        default: 'all'
      dry_run:
        description: 'Dry run (list models without exporting)'
        type: boolean
        default: false
  release:
    types: [created]

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        if: inputs.dry_run != true
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev
          python -m pip install pybind11

      - name: Install Python dependencies
        if: inputs.dry_run != true
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel cmake
          PIP_EXTRA_INDEX_URL="https://www.paddlepaddle.org.cn/packages/nightly/cpu/" python -m pip install paddlepaddle
          python -m pip install -e .
          python -m pip install huggingface-hub onnx onnxruntime numpy

      - name: Dry run
        if: inputs.dry_run == true
        run: |
          python -m pip install --upgrade pip
          python -m pip install huggingface-hub
          python tools/export_hf_models.py --all --output-dir ./exports --dry-run

      - name: Export models
        if: inputs.dry_run != true
        run: |
          MODEL="${{ github.event.inputs.model || 'all' }}"
          if [ "$MODEL" = "all" ] || [ "${{ github.event_name }}" = "release" ]; then
            python tools/export_hf_models.py --all --output-dir ./exports
          else
            python tools/export_hf_models.py --model "$MODEL" --output-dir ./exports
          fi

      - name: Upload artifacts
        if: inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: onnx-models
          path: |
            exports/*.onnx
            exports/manifest.json
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in exports/*.onnx exports/manifest.json; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
